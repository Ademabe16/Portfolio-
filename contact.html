        <div class="contacts">
          <a class="social-card github" href="https://github.com/Ademabe16" target="_blank" rel="noreferrer">
            <span class="social-icon"><img src="resource/photo_2026-03-14_13-50-51.jpg" alt="github"></span>
            <div><strong>GitHub</strong><span>/Ademabe16</span></div>
          </a>

          <a class="social-card instagram" href="https://www.instagram.com/black_adam1995?igsh=c2plMHowcXY0ZGVj" target="_blank" rel="noreferrer">
            <span class="social-icon"><img src="resource/photo_2026-03-14_13-50-59.jpg" alt="instagram"></span>
            <div><strong>Instagram</strong><span>@black_adam1995</span></div>

          <a class="social-card telegram" href="https://t.me/Dreamer80a" target="_blank" rel="noreferrer">

        <form class="contact-form" action="mailto:adeabe205@gmail.com" method="post" enctype="text/plain">
          <div class="form-row">
            <label>
              Name
              <input type="text" name="name" required placeholder="Your name">
            </label>
            <label>
              Email
              <input type="email" name="email" required placeholder="you@example.com">
            </label>
          </div>

          <label>
            Subject
            <input type="text" name="subject" placeholder="Project or enquiry">
          </label>

          <label>
            Message
            <textarea name="message" required placeholder="Tell me about your project..."></textarea>
          </label>

          <div>
            <button type="submit" class="submit-btn">Send Message</button>
          </div>
        </form>
      </section>

      <footer>
        <p>© Adem — Contact</p>
      </footer>
